name: Deploy to Self-Hosted Runner

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build and Deploy
    runs-on: self-hosted

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t biofilter-website:latest .

      - name: Stop and Remove Existing Container
        run: |
          docker stop biofilter-app || true
          docker rm biofilter-app || true

      - name: Run New Docker Container (Port 8081)
        run: |
          docker run -d --name biofilter-app -p 8081:80 --restart always biofilter-website:latest

      - name: Clean Up Unused Docker Images
        run: |
          docker image prune -f
