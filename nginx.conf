server {
    listen 80;
    server_name localhost;

    # Kích hoạt gzip để nén tài nguyên truyền tải nhanh hơn
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/x-javascript application/xml application/json image/svg+xml;
    gzip_disable "MSIE [1-6]\.";

    root /usr/share/nginx/html;
    index index.html;

    # Hỗ trợ Client-side Routing cho React (Vite)
    location / {
        try_files $uri $uri/ /index.html;
        # Không cache file index.html để đảm bảo người dùng luôn nhận được code mới nhất
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }

    # Cache mạnh mẽ các tài nguyên tĩnh (Vite tự động băm (hash) file trong folder assets)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # Trang lỗi mặc định
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
